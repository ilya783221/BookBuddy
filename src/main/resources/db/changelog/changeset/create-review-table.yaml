#file: noinspection YAMLSchemaValidation
databaseChangeLog:
  - changeSet:
      id: create-review-table
      author: Ilya
      changes:
        - createTable:
            tableName: review
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: book_id
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: rating
                  type: int
                  constraints:
                    nullable: false

              - column:
                  name: comment
                  type: VARCHAR(255)

        - addForeignKeyConstraint:
            baseTableName: review
            baseColumnNames: user_id
            referencedTableName: "user"
            referencedColumnNames: id
            constraintName: fk_review_user

        - addForeignKeyConstraint:
            baseTableName: review
            baseColumnNames: book_id
            referencedTableName: book
            referencedColumnNames: id
            constraintName: fk_review_book

        - sql:
            sql: ALTER TABLE review ADD CONSTRAINT chk_rating_1_5 CHECK (rating >= 1 AND rating <= 5);