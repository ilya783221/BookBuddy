databaseChangeLog:
  - changeSet:
      id: create-book-table
      author: Ilya
      changes:
        - createTable:
            tableName: book
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: author
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: published_year
                  type: int

              - column:
                  name: genre
                  type: VARCHAR(255)